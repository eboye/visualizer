name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config clang libclang-dev \
            libpipewire-0.3-dev libdbus-1-dev libfontconfig-1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --locked

      - name: Package
        run: |
          tar -C target/release -czf "visualizer-${{ github.ref_name }}-linux-x86_64.tar.gz" visualizer
          sha256sum "visualizer-${{ github.ref_name }}-linux-x86_64.tar.gz" > "visualizer-${{ github.ref_name }}-linux-x86_64.tar.gz.sha256"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            visualizer-*.tar.gz
            visualizer-*.tar.gz.sha256
